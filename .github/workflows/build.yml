name: Build AAB
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Install Android SDK 35
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-35" "build-tools;35.0.0"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - name: Setup
        run: |
          flutter create --org com.nuhkozan --project-name karpuz tmp_project
          rm -rf android && cp -r tmp_project/android . && rm -rf tmp_project
          perl -i -pe 's/org\.jetbrains\.kotlin\.android" version "[^"]+"/org.jetbrains.kotlin.android" version "2.0.21"/' android/settings.gradle
          perl -i -pe 's/targetSdk = flutter\.targetSdkVersion/targetSdk = 35/' android/app/build.gradle
          perl -i -pe 's/compileSdk = flutter\.compileSdkVersion/compileSdk = 35/' android/app/build.gradle
      - name: Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=keystore.jks\n' \
            '${{ secrets.STORE_PASSWORD }}' '${{ secrets.KEY_PASSWORD }}' '${{ secrets.KEY_ALIAS }}' \
            > android/key.properties
          cat android/key.properties
      - name: Patch build.gradle for signing
        run: |
          python3 << 'EOF'
          txt = open('android/app/build.gradle').read()
          signing = """
              signingConfigs {
                  release {
                      def props = new Properties()
                      def f = rootProject.file('key.properties')
                      if (f.exists()) { f.withInputStream { props.load(it) } }
                      keyAlias props['keyAlias']
                      keyPassword props['keyPassword']
                      storeFile file(props['storeFile'])
                      storePassword props['storePassword']
                  }
              }
          """
          txt = txt.replace('    buildTypes {', signing + '\n    buildTypes {')
          txt = txt.replace('signingConfig signingConfigs.debug', 'signingConfig signingConfigs.release')
          open('android/app/build.gradle','w').write(txt)
          print('Done')
          EOF
      - name: Flutter pub get
        run: flutter pub get
      - name: Build
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          flutter build appbundle --release \
            -Pandroid.injected.signing.store.file=$(pwd)/android/app/keystore.jks \
            -Pandroid.injected.signing.store.password=$STORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD
      - uses: actions/upload-artifact@v4
        with:
          name: karpuz-release.aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
