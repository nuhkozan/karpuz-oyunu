name: Build AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Create Flutter project
        run: |
          flutter create --org com.nuhkozan --project-name karpuz tmp_project
          rm -rf android
          cp -r tmp_project/android .
          rm -rf tmp_project

      - name: Flutter pub get
        run: flutter pub get

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties << EOF2
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=keystore.jks
          EOF2

      - name: Configure signing
        run: |
          sed -i 's/applicationId "com.nuhkozan.karpuz"/applicationId "com.nuhkozan.karpuz"/' android/app/build.gradle
          cat >> android/app/build.gradle << EOF2
          android.buildTypes.release.signingConfig = android.signingConfigs.create("release")
          android.signingConfigs.release.keyAlias = "karpuz"
          android.signingConfigs.release.keyPassword = "${{ secrets.KEY_PASSWORD }}"
          android.signingConfigs.release.storeFile = file("keystore.jks")
          android.signingConfigs.release.storePassword = "${{ secrets.STORE_PASSWORD }}"
          EOF2

      - name: Set targetSdk
        run: sed -i 's/targetSdk = flutter.targetSdkVersion/targetSdk = 35/' android/app/build.gradle

      - name: Build AAB
        run: flutter build appbundle --release

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: karpuz-release.aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
