name: Build AAB
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'
      - name: Setup
        run: |
          flutter create --org com.nuhkozan --project-name karpuz tmp_project
          rm -rf android && cp -r tmp_project/android . && rm -rf tmp_project
          perl -i -pe 's/targetSdk = flutter\.targetSdkVersion/targetSdk = 35/' android/app/build.gradle.kts
          perl -i -pe 's/compileSdk = flutter\.compileSdkVersion/compileSdk = 35/' android/app/build.gradle.kts
          perl -i -pe 's/ndkVersion = "[^"]+"/ndkVersion = "27.0.12077973"/' android/app/build.gradle.kts
          python3 << 'EOF'
          with open('android/app/src/main/AndroidManifest.xml','r') as f:
              c = f.read()
          # App ismi düzelt
          c = c.replace('android:label="karpuz"','android:label="Karpuz"')
          # WhatsApp için query ekle
          c = c.replace('</manifest>','<queries><package android:name="com.whatsapp"/><package android:name="com.whatsapp.w4b"/></queries></manifest>')
          # Network güvenlik config ekle
          c = c.replace('android:label="Karpuz"','android:label="Karpuz" android:usesCleartextTraffic="true" android:networkSecurityConfig="@xml/network_security_config"')
          with open('android/app/src/main/AndroidManifest.xml','w') as f:
              f.write(c)
          import os
          os.makedirs('android/app/src/main/res/xml', exist_ok=True)
          with open('android/app/src/main/res/xml/network_security_config.xml','w') as f:
              f.write('''<?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <base-config cleartextTrafficPermitted="true">
                  <trust-anchors>
                      <certificates src="system"/>
                  </trust-anchors>
              </base-config>
          </network-security-config>''')
          print('Manifest patched')
          EOF
      - name: Set App Icon
        run: |
          pip install Pillow -q
          python3 << 'EOF'
          from PIL import Image
          import os
          sizes = {'mipmap-mdpi':48,'mipmap-hdpi':72,'mipmap-xhdpi':96,'mipmap-xxhdpi':144,'mipmap-xxxhdpi':192}
          img = Image.open('icon_512-1.png').convert('RGBA')
          for d,s in sizes.items():
            path = f'android/app/src/main/res/{d}'
            os.makedirs(path, exist_ok=True)
            r = img.resize((s,s), Image.LANCZOS)
            r.save(f'{path}/ic_launcher.png')
            r.save(f'{path}/ic_launcher_round.png')
          print('Icons done')
          EOF
      - name: Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks
      - name: Flutter pub get
        run: flutter pub get
      - name: Build
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          flutter build appbundle --release \
            -Pandroid.injected.signing.store.file=$(pwd)/android/app/keystore.jks \
            -Pandroid.injected.signing.store.password=$STORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD
      - uses: actions/upload-artifact@v4
        with:
          name: karpuz-release.aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
