name: Build AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Setup project
        run: |
          flutter create --org com.nuhkozan --project-name karpuz tmp_project
          rm -rf android
          cp -r tmp_project/android .
          rm -rf tmp_project
          python3 - << 'PYEOF'
          import re
          files = {
            'android/app/build.gradle': [
              ('targetSdk = flutter.targetSdkVersion', 'targetSdk = 34'),
              ('compileSdk = flutter.compileSdkVersion', 'compileSdk = 34'),
              ('versionCode flutter.versionCode', 'versionCode 6'),
              ('versionName flutter.versionName', 'versionName "1.0.6"'),
            ],
            'android/settings.gradle': [
              ('org.jetbrains.kotlin.android" version "1.8.', 'org.jetbrains.kotlin.android" version "1.9.'),
            ]
          }
          for path, replacements in files.items():
            try:
              with open(path) as f: content = f.read()
              for old, new in replacements:
                content = content.replace(old, new)
              with open(path, 'w') as f: f.write(content)
              print(f'Updated {path}')
            except Exception as e:
              print(f'Skip {path}: {e}')
          PYEOF

      - name: Flutter pub get
        run: flutter pub get

      - name: Setup keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks
          python3 - << 'PYEOF'
          import os
          content = open('android/app/build.gradle').read()
          signing = f"""
              signingConfigs {{
                  release {{
                      keyAlias "{os.environ['KEY_ALIAS']}"
                      keyPassword "{os.environ['KEY_PASSWORD']}"
                      storeFile file("keystore.jks")
                      storePassword "{os.environ['STORE_PASSWORD']}"
                  }}
              }}
          """
          content = content.replace('buildTypes {', signing + '\n    buildTypes {')
          content = content.replace('signingConfig signingConfigs.debug', 'signingConfig signingConfigs.release')
          open('android/app/build.gradle', 'w').write(content)
          print('Signing configured')
          PYEOF

      - name: Build AAB
        run: flutter build appbundle --release

      - uses: actions/upload-artifact@v4
        with:
          name: karpuz-release.aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
