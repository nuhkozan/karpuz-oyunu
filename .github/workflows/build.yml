name: Build AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Setup project
        run: |
          flutter create --org com.nuhkozan --project-name karpuz tmp_project
          rm -rf android
          cp -r tmp_project/android .
          rm -rf tmp_project
          sed -i 's/targetSdk = flutter.targetSdkVersion/targetSdk = 34/' android/app/build.gradle
          sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 34/' android/app/build.gradle
          sed -i 's/versionCode flutter.versionCode/versionCode 6/' android/app/build.gradle
          sed -i 's/versionName flutter.versionName/versionName "1.0.6"/' android/app/build.gradle

      - name: Flutter pub get
        run: flutter pub get

      - name: Setup keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks
          cat > android/key.properties << EOF2
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=keystore.jks
          EOF2
          sed -i '/buildTypes {/i\    signingConfigs { release { keyAlias "${{ secrets.KEY_ALIAS }}"; keyPassword "${{ secrets.KEY_PASSWORD }}"; storeFile file("keystore.jks"); storePassword "${{ secrets.STORE_PASSWORD }}" } }' android/app/build.gradle
          sed -i 's/signingConfig signingConfigs.debug/signingConfig signingConfigs.release/' android/app/build.gradle

      - name: Build AAB
        run: flutter build appbundle --release

      - uses: actions/upload-artifact@v4
        with:
          name: karpuz-release.aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
