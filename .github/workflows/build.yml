name: Build AAB
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'
      - name: Setup
        run: |
          flutter create --org com.nuhkozan --project-name karpuz tmp_project
          rm -rf android && cp -r tmp_project/android . && rm -rf tmp_project
          perl -i -pe 's/targetSdk = flutter\.targetSdkVersion/targetSdk = 35/' android/app/build.gradle.kts
          perl -i -pe 's/compileSdk = flutter\.compileSdkVersion/compileSdk = 35/' android/app/build.gradle.kts
      - name: Set App Icon
        run: |
          for size in 48 72 96 144 192; do
            case $size in
              48)  dir="mipmap-mdpi";;
              72)  dir="mipmap-hdpi";;
              96)  dir="mipmap-xhdpi";;
              144) dir="mipmap-xxhdpi";;
              192) dir="mipmap-xxxhdpi";;
            esac
            mkdir -p android/app/src/main/res/$dir
            convert -resize ${size}x${size} icon_512-1.png android/app/src/main/res/$dir/ic_launcher.png
            cp android/app/src/main/res/$dir/ic_launcher.png android/app/src/main/res/$dir/ic_launcher_round.png
          done
      - name: Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=keystore.jks\n' \
            '${{ secrets.STORE_PASSWORD }}' '${{ secrets.KEY_PASSWORD }}' '${{ secrets.KEY_ALIAS }}' \
            > android/key.properties
          cat android/key.properties
      - name: Patch build.gradle.kts for signing
        run: |
          python3 << 'EOF'
          path = 'android/app/build.gradle.kts'
          txt = open(path).read()
          signing = """
              signingConfigs {
                  create("release") {
                      val props = java.util.Properties()
                      val f = rootProject.file("key.properties")
                      if (f.exists()) { f.inputStream().use { props.load(it) } }
                      keyAlias = props["keyAlias"] as String
                      keyPassword = props["keyPassword"] as String
                      storeFile = file(props["storeFile"] as String)
                      storePassword = props["storePassword"] as String
                  }
              }
          """
          txt = txt.replace('    buildTypes {', signing + '\n    buildTypes {')
          txt = txt.replace('signingConfig = signingConfigs.getByName("debug")', 'signingConfig = signingConfigs.getByName("release")')
          open(path, 'w').write(txt)
          print('Done')
          EOF
      - name: Flutter pub get
        run: flutter pub get
      - name: Build
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          flutter build appbundle --release \
            -Pandroid.injected.signing.store.file=$(pwd)/android/app/keystore.jks \
            -Pandroid.injected.signing.store.password=$STORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD
      - uses: actions/upload-artifact@v4
        with:
          name: karpuz-release.aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
