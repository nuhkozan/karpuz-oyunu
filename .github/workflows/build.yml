name: Build AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Setup project
        run: |
          flutter create --org com.nuhkozan --project-name karpuz tmp_project
          rm -rf android
          cp -r tmp_project/android .
          rm -rf tmp_project
          cat android/settings.gradle
          perl -i -pe 's/org\.jetbrains\.kotlin\.android" version "[^"]+"/org.jetbrains.kotlin.android" version "2.0.21"/' android/settings.gradle
          perl -i -pe 's/targetSdk = flutter\.targetSdkVersion/targetSdk = 34/' android/app/build.gradle
          perl -i -pe 's/compileSdk = flutter\.compileSdkVersion/compileSdk = 34/' android/app/build.gradle
          perl -i -pe 's/versionCode flutter\.versionCode/versionCode 7/' android/app/build.gradle

      - name: Flutter pub get
        run: flutter pub get

      - name: Setup keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks
          perl -i -0pe "s/buildTypes \{/signingConfigs { release { keyAlias '$KEY_ALIAS'; keyPassword '$KEY_PASSWORD'; storeFile file('keystore.jks'); storePassword '$STORE_PASSWORD' } }\n    buildTypes {/" android/app/build.gradle
          perl -i -pe "s/signingConfig signingConfigs\.debug/signingConfig signingConfigs.release/" android/app/build.gradle

      - name: Build AAB
        run: flutter build appbundle --release

      - uses: actions/upload-artifact@v4
        with:
          name: karpuz-release.aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
